[alias]
loco = "run --"
loco-tool = "run --"

playground = "run --example playground"

# https://github.com/rust-lang/rust/issues/141626
# (can be removed once link.exe is fixed)
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

[unstable]
codegen-backend = true

[target.'cfg(target_os = "linux")']
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/mold"]

[profile.dev]
codegen-backend = "cranelift"

[profile.dev.package.aws-lc-rs]
codegen-backend = "llvm"

[profile.dev.package.aws-lc-sys]
codegen-backend = "llvm"

[profile.dev.package.rustls]
codegen-backend = "llvm"
